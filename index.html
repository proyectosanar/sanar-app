<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>SANAR · Mis Registros</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: {
              50:  '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              800: '#115e59',
            },
          },
          boxShadow: {
            card: '0 4px 20px -2px rgba(15, 118, 110, 0.08), 0 2px 6px -1px rgba(0, 0, 0, 0.04)',
            'card-hover':
              '0 10px 30px -6px rgba(15, 118, 110, 0.18), 0 4px 10px -2px rgba(0, 0, 0, 0.05)',
          },
        },
      },
    };
  </script>

  <style>
    html, body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .card-tap { transition: transform .08s ease-out, box-shadow .18s ease-out; }
    .card-tap:active { transform: scale(0.98); }
    @media (hover: hover) { .card-tap:hover { transform: translateY(-2px); } }
    .fade-in { animation: fadeIn .18s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    [hidden] { display: none !important; }
  </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen antialiased">
  <!-- ================== HEADER ================== -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
      <button
        id="btnBack"
        class="flex items-center gap-1 pl-2 pr-3 py-2 -ml-2 rounded-full hover:bg-slate-100 active:bg-slate-200 text-slate-700 font-medium text-sm hidden"
        aria-label="Volver al inicio"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
        </svg>
        <span>Volver</span>
      </button>
      <div class="flex items-center gap-2 min-w-0 flex-1">
        <img
          src="logo.png"
          alt="Proyecto Sanar"
          class="h-9 w-auto object-contain shrink-0"
          onerror="this.style.display='none'"
        />
        <div id="headerSubtitle" class="text-sm text-slate-500 leading-tight truncate">Mis registros</div>
      </div>
    </div>
  </header>

  <main id="main" class="max-w-3xl mx-auto px-4 py-6 pb-24"></main>

  <!-- Templates -->
  <template id="tplHome">
    <div class="fade-in">
      <div class="flex justify-center mb-8">
        <img
          src="logo.png"
          alt="Proyecto Sanar"
          class="max-h-24 sm:max-h-32 w-auto object-contain"
          onerror="this.style.display='none'"
        />
      </div>

      <div class="grid gap-4">
        <a
          id="linkCargar"
          class="card-tap block rounded-2xl bg-white border border-slate-200 shadow-card hover:shadow-card-hover p-5"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-xl bg-brand-50 text-brand-700 grid place-items-center text-2xl shrink-0">📝</div>
            <div class="min-w-0">
              <h2 class="text-lg font-semibold text-slate-900">Cargar producción</h2>
              <p class="text-sm text-slate-600 mt-1">Abrir el formulario para registrar el trabajo de hoy.</p>
            </div>
            <svg class="w-5 h-5 text-slate-400 mt-2 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </a>

        <a
          class="card-tap block rounded-2xl bg-white border border-slate-200 shadow-card hover:shadow-card-hover p-5"
          href="#/consulta"
        >
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-xl bg-brand-50 text-brand-700 grid place-items-center text-2xl shrink-0">📋</div>
            <div class="min-w-0">
              <h2 class="text-lg font-semibold text-slate-900">Consultar mis registros</h2>
              <p class="text-sm text-slate-600 mt-1">Ver lo que cargaste este mes y revisar si falta algo.</p>
            </div>
            <svg class="w-5 h-5 text-slate-400 mt-2 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        </a>
      </div>

      <div class="mt-10 flex flex-col items-center gap-2">
        <img
          src="logo-matricia.png"
          alt="matricia"
          class="h-10 w-auto opacity-80"
          onerror="this.style.display='none'"
        />
        <p class="text-xs text-slate-500">SANAR · uso interno</p>
      </div>
    </div>
  </template>

  <template id="tplConsulta">
    <div class="fade-in space-y-4">
      <!-- Filtros -->
      <section class="bg-white rounded-2xl border border-slate-200 shadow-card p-4 sm:p-5 space-y-3">
        <div>
          <label class="text-xs font-medium text-slate-500 uppercase tracking-wide" for="fPersona">Colaboradora</label>
          <select
            id="fPersona"
            class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
          >
            <option value="">Elegí tu nombre…</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-medium text-slate-500 uppercase tracking-wide" for="fMes">Mes</label>
            <select
              id="fMes"
              class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
            ></select>
          </div>
          <div>
            <label class="text-xs font-medium text-slate-500 uppercase tracking-wide" for="fBuscar">Buscar</label>
            <input
              id="fBuscar"
              type="search"
              placeholder="producto, fecha…"
              class="mt-1 w-full rounded-xl border border-slate-300 bg-white px-3 py-3 text-base focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
            />
          </div>
        </div>
      </section>

      <!-- Resumen del mes -->
      <section id="resumenMes" class="grid grid-cols-3 gap-2" hidden>
        <div class="rounded-2xl bg-white border border-slate-200 p-3 text-center">
          <div class="text-xs uppercase tracking-wide text-slate-500">Días</div>
          <div id="rDias" class="text-xl font-bold text-slate-900">0</div>
        </div>
        <div class="rounded-2xl bg-white border border-slate-200 p-3 text-center">
          <div class="text-xs uppercase tracking-wide text-slate-500">Horas</div>
          <div id="rHoras" class="text-xl font-bold text-slate-900">0</div>
        </div>
        <div class="rounded-2xl bg-white border border-slate-200 p-3 text-center">
          <div class="text-xs uppercase tracking-wide text-slate-500">Productos</div>
          <div id="rProds" class="text-xl font-bold text-slate-900">0</div>
        </div>
      </section>

      <!-- Estados -->
      <div id="estado" class="text-center py-10 text-slate-500 text-sm" hidden>
        <div class="inline-block w-8 h-8 border-2 border-brand-500 border-t-transparent rounded-full animate-spin mb-2"></div>
        <div id="estadoTxt">Cargando…</div>
      </div>

      <!-- Lista de registros -->
      <section id="lista" class="space-y-3"></section>

      <div id="vacio" class="hidden text-center py-12 text-slate-500">
        <div class="text-5xl mb-3">🔍</div>
        <p class="font-medium text-slate-700">No hay registros para mostrar</p>
        <p class="text-sm mt-1">Cambiá el mes o el filtro para ver otros.</p>
      </div>
    </div>
  </template>

  <template id="tplRegistro">
    <article class="bg-white rounded-2xl border border-slate-200 shadow-card p-4">
      <header class="flex items-baseline justify-between gap-2">
        <div>
          <div class="text-xs uppercase tracking-wide text-brand-700 font-semibold" data-slot="dia"></div>
          <div class="text-lg font-bold text-slate-900" data-slot="fecha"></div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-xs uppercase tracking-wide text-slate-500">Horas</div>
          <div class="text-lg font-semibold text-slate-900" data-slot="horas"></div>
        </div>
      </header>

      <div class="mt-3 text-sm text-slate-600" data-slot="jornada"></div>

      <div class="mt-3 text-xs">
        <span
          class="inline-flex items-center gap-1 px-2 py-1 rounded-full bg-brand-50 text-brand-700 font-medium"
          data-slot="actividad"
        ></span>
      </div>

      <div class="mt-3 border-t border-slate-100 pt-3" data-slot="trabajosWrap" hidden>
        <div class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">Trabajo por hora</div>
        <ul class="text-sm text-slate-700 space-y-1" data-slot="trabajos"></ul>
      </div>

      <div class="mt-3 border-t border-slate-100 pt-3" data-slot="productosWrap" hidden>
        <div class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1">Productos</div>
        <ul class="text-sm text-slate-700 space-y-1" data-slot="productos"></ul>
      </div>
    </article>
  </template>

  <!-- ================== SCRIPT ================== -->
  <script>
    // ---------------------------------------------------------------------
    // CONFIGURACIÓN — reemplazar antes de subir la app
    // ---------------------------------------------------------------------
    const CONFIG = {
      // URL de tu Web App de Google Apps Script (termina en .../exec)
      APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwA6--iQZnCzbWY-42C_290HZ9mQnPhZKW-Y7p-oghyKSU-DqG1HTwQ41z_bNwKML5I/exec',
      // URL del formulario Google para "Cargar producción"
      GOOGLE_FORM_URL: 'https://forms.gle/cT4j7qkmeyXSjayu7',
    };
    // ---------------------------------------------------------------------

    const state = {
      colaboradoras: [],
      registros: [],
      filtros: {
        persona: localStorage.getItem('sanar.persona') || '',
        mes: localStorage.getItem('sanar.mes') || mesActualISO(),
        buscar: '',
      },
    };

    function mesActualISO() {
      const d = new Date();
      const p = n => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + p(d.getMonth() + 1);
    }

    function primerDiaDelMes(mesISO) {
      const [y, m] = mesISO.split('-').map(Number);
      return new Date(y, m - 1, 1);
    }
    function ultimoDiaDelMes(mesISO) {
      const [y, m] = mesISO.split('-').map(Number);
      return new Date(y, m, 0);
    }
    function formatFechaISO(d) {
      const p = n => String(n).padStart(2, '0');
      return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
    }
    function formatFechaLegible(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      const fecha = new Date(y, m - 1, d);
      return fecha.toLocaleDateString('es-AR', {
        day: 'numeric',
        month: 'long',
        year: 'numeric',
      });
    }

    // ---------------------------------------------------------------------
    // Router (hash)
    // ---------------------------------------------------------------------
    function router() {
      const hash = location.hash || '#/';
      if (hash.startsWith('#/consulta')) return mountConsulta();
      return mountHome();
    }
    window.addEventListener('hashchange', router);

    // ---------------------------------------------------------------------
    // HOME
    // ---------------------------------------------------------------------
    function mountHome() {
      document.getElementById('btnBack').classList.add('hidden');
      document.getElementById('headerSubtitle').textContent = 'Inicio';
      const main = document.getElementById('main');
      main.innerHTML = '';
      const node = document.getElementById('tplHome').content.cloneNode(true);

      // Link a Google Form
      const linkCargar = node.getElementById('linkCargar');
      if (CONFIG.GOOGLE_FORM_URL && !CONFIG.GOOGLE_FORM_URL.startsWith('PONER_')) {
        linkCargar.href = CONFIG.GOOGLE_FORM_URL;
      } else {
        linkCargar.addEventListener('click', e => {
          e.preventDefault();
          alert('Falta configurar la URL del formulario en index.html (CONFIG.GOOGLE_FORM_URL).');
        });
      }

      main.appendChild(node);
    }

    // ---------------------------------------------------------------------
    // CONSULTA
    // ---------------------------------------------------------------------
    function mountConsulta() {
      const btn = document.getElementById('btnBack');
      btn.classList.remove('hidden');
      btn.onclick = () => (location.hash = '#/');
      document.getElementById('headerSubtitle').textContent = 'Mis registros';

      const main = document.getElementById('main');
      main.innerHTML = '';
      const node = document.getElementById('tplConsulta').content.cloneNode(true);
      main.appendChild(node);

      inicializarFiltros();
      cargarColaboradoras();
      cargarRegistros();
    }

    function inicializarFiltros() {
      const selMes = document.getElementById('fMes');
      // opciones: mes actual + los 11 anteriores
      const hoy = new Date();
      selMes.innerHTML = '';
      for (let i = 0; i < 12; i++) {
        const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
        const iso = formatFechaISO(d).slice(0, 7);
        const opt = document.createElement('option');
        opt.value = iso;
        opt.textContent = d.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
        selMes.appendChild(opt);
      }
      selMes.value = state.filtros.mes;
      selMes.addEventListener('change', () => {
        state.filtros.mes = selMes.value;
        localStorage.setItem('sanar.mes', selMes.value);
        cargarRegistros();
      });

      const selPersona = document.getElementById('fPersona');
      selPersona.addEventListener('change', () => {
        state.filtros.persona = selPersona.value;
        localStorage.setItem('sanar.persona', selPersona.value);
        cargarRegistros();
      });

      const inpBuscar = document.getElementById('fBuscar');
      let deb;
      inpBuscar.addEventListener('input', () => {
        clearTimeout(deb);
        deb = setTimeout(() => {
          state.filtros.buscar = inpBuscar.value.trim().toLowerCase();
          render();
        }, 200);
      });
    }

    async function cargarColaboradoras() {
      try {
        const data = await api({ action: 'colaboradoras' });
        state.colaboradoras = data.colaboradoras || [];
        const sel = document.getElementById('fPersona');
        // preservar opción "elegir"
        const first = sel.firstElementChild;
        sel.innerHTML = '';
        sel.appendChild(first);
        state.colaboradoras.forEach(n => {
          const opt = document.createElement('option');
          opt.value = n;
          opt.textContent = n;
          sel.appendChild(opt);
        });
        if (state.filtros.persona && state.colaboradoras.includes(state.filtros.persona)) {
          sel.value = state.filtros.persona;
        }
      } catch (err) {
        mostrarEstado('No se pudo cargar la lista de colaboradoras: ' + err.message);
      }
    }

    async function cargarRegistros() {
      const { persona, mes } = state.filtros;
      if (!persona) {
        state.registros = [];
        render();
        return;
      }
      const desde = formatFechaISO(primerDiaDelMes(mes));
      const hasta = formatFechaISO(ultimoDiaDelMes(mes));
      mostrarEstado('Cargando registros…', true);
      try {
        const data = await api({ action: 'registros', persona, desde, hasta });
        state.registros = data.registros || [];
        render();
      } catch (err) {
        mostrarEstado('No se pudieron cargar los registros: ' + err.message);
      }
    }

    function mostrarEstado(msg, spinner = false) {
      const est = document.getElementById('estado');
      est.hidden = false;
      document.getElementById('estadoTxt').textContent = msg;
      est.querySelector('.animate-spin').style.display = spinner ? 'inline-block' : 'none';
      document.getElementById('lista').innerHTML = '';
      document.getElementById('vacio').hidden = true;
      document.getElementById('resumenMes').hidden = true;
    }

    function ocultarEstado() {
      document.getElementById('estado').hidden = true;
    }

    function render() {
      ocultarEstado();
      const lista = document.getElementById('lista');
      const vacio = document.getElementById('vacio');
      const resumen = document.getElementById('resumenMes');
      lista.innerHTML = '';

      if (!state.filtros.persona) {
        vacio.hidden = false;
        vacio.querySelector('p.font-medium').textContent = 'Elegí tu nombre para empezar';
        vacio.querySelector('p.text-sm').textContent = 'Los registros se cargan según la persona seleccionada.';
        resumen.hidden = true;
        return;
      }
      vacio.querySelector('p.font-medium').textContent = 'No hay registros para mostrar';
      vacio.querySelector('p.text-sm').textContent = 'Cambiá el mes o el filtro para ver otros.';

      const q = state.filtros.buscar;
      const filtrados = state.registros.filter(r => {
        if (!q) return true;
        const hay =
          (r.fecha || '').includes(q) ||
          (r.actividad || '').toLowerCase().includes(q) ||
          (r.productos || []).some(p => (p.nombre || '').toLowerCase().includes(q)) ||
          (r.trabajos_por_hora || []).some(t => (t.tipo || '').toLowerCase().includes(q));
        return hay;
      });

      // Resumen (horas = suma de "Cantidad de horas (1)" + "(2)")
      const totalHoras = filtrados.reduce((s, r) => s + (r.horas_billables || 0), 0);
      const totalProds = filtrados.reduce((s, r) => s + (r.cantidad_productos || 0), 0);
      document.getElementById('rDias').textContent = String(filtrados.length);
      document.getElementById('rHoras').textContent = totalHoras.toFixed(1).replace('.', ',');
      document.getElementById('rProds').textContent = totalProds.toLocaleString('es-AR');
      resumen.hidden = false;

      if (filtrados.length === 0) {
        vacio.hidden = false;
        return;
      }
      vacio.hidden = true;

      const tpl = document.getElementById('tplRegistro');
      for (const r of filtrados) {
        const node = tpl.content.cloneNode(true);
        node.querySelector('[data-slot="dia"]').textContent = r.dia_semana || '';
        node.querySelector('[data-slot="fecha"]').textContent = formatFechaLegible(r.fecha);
        const horasCard = (r.horas_billables && r.horas_billables > 0)
          ? r.horas_billables
          : r.horas_trabajadas;
        node.querySelector('[data-slot="horas"]').textContent =
          horasCard != null && horasCard !== 0
            ? String(horasCard).replace('.', ',') + ' hs'
            : '—';

        // Jornada
        const jornada = [];
        if (r.ingreso) jornada.push('Ingreso ' + r.ingreso);
        if (r.egreso) jornada.push('Egreso ' + r.egreso);
        if (r.salida && r.regreso) jornada.push('salida ' + r.salida + ' → regreso ' + r.regreso);
        node.querySelector('[data-slot="jornada"]').textContent = jornada.join(' · ');

        node.querySelector('[data-slot="actividad"]').textContent = r.actividad || 'Sin actividad';

        // Trabajos por hora
        const trabWrap = node.querySelector('[data-slot="trabajosWrap"]');
        const trabUl = node.querySelector('[data-slot="trabajos"]');
        if (r.trabajos_por_hora && r.trabajos_por_hora.length) {
          trabWrap.hidden = false;
          for (const t of r.trabajos_por_hora) {
            const li = document.createElement('li');
            li.className = 'flex justify-between gap-2';
            const span1 = document.createElement('span');
            span1.className = 'truncate';
            span1.textContent = t.tipo;
            const span2 = document.createElement('span');
            span2.className = 'font-semibold text-slate-900 shrink-0';
            const horasFmt = String(t.horas).replace('.', ',');
            span2.textContent = horasFmt + ' hs';
            li.appendChild(span1);
            li.appendChild(span2);
            trabUl.appendChild(li);
          }
        }

        // Productos
        const prodsWrap = node.querySelector('[data-slot="productosWrap"]');
        const prodsUl = node.querySelector('[data-slot="productos"]');
        if (r.productos && r.productos.length) {
          prodsWrap.hidden = false;
          for (const p of r.productos) {
            const li = document.createElement('li');
            li.className = 'flex justify-between gap-2';
            const span1 = document.createElement('span');
            span1.className = 'truncate';
            span1.textContent = p.nombre;
            const span2 = document.createElement('span');
            span2.className = 'font-semibold text-slate-900 shrink-0';
            span2.textContent = p.cantidad.toLocaleString('es-AR');
            li.appendChild(span1);
            li.appendChild(span2);
            prodsUl.appendChild(li);
          }
        }
        lista.appendChild(node);
      }
    }

    // ---------------------------------------------------------------------
    // API
    // ---------------------------------------------------------------------
    async function api(params) {
      if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.startsWith('PONER_')) {
        throw new Error('Falta configurar CONFIG.APPS_SCRIPT_URL en index.html.');
      }
      const url = new URL(CONFIG.APPS_SCRIPT_URL);
      for (const [k, v] of Object.entries(params)) if (v != null) url.searchParams.set(k, v);

      const res = await fetch(url.toString(), { method: 'GET' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'error del servidor');
      return data;
    }

    // ---------------------------------------------------------------------
    // Boot
    // ---------------------------------------------------------------------
    router();
  </script>
</body>
</html>
